server:
  port: 8080

spring:
  application:
    name: edu-backend
  datasource:
    url: jdbc:h2:mem:edu_platform;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  is-concurrent: true
  is-share: false
  is-read-cookie: false
  is-read-header: true
  is-log: false

openclaw:
  gateway:
    url: ${OPENCLAW_GATEWAY_URL:http://localhost:18789}
    token: ${OPENCLAW_GATEWAY_TOKEN:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

crypto:
  secret-key: ${CRYPTO_SECRET_KEY:dev-only-key-not-for-production!}
